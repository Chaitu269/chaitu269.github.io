<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verify Access</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c20 0%, #15102a 50%, #06040a 100%);
            --accent-glow: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 24px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            gap: 32px;
        }

        /* Header Styling */
        .header {
            text-align: center;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .logo-container {
            width: 80px;
            height: 80px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px auto;
            position: relative;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .logo-container::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: var(--accent-glow);
            z-index: -1;
            opacity: 0.3;
            filter: blur(8px);
        }

        .logo-svg {
            width: 40px;
            height: 40px;
            fill: #a855f7;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            background: linear-gradient(120deg, #ffffff, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 400;
            padding: 0 16px;
        }

        /* Timer Circular Progress */
        .timer-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            animation: scaleIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .progress-ring-container {
            position: relative;
            width: 160px;
            height: 160px;
        }

        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-circle-bg {
            fill: transparent;
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 10;
        }

        .progress-ring-circle {
            fill: transparent;
            stroke: url(#gradient);
            stroke-width: 10;
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.1s linear;
        }

        .timer-text {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .timer-number {
            font-size: 40px;
            font-weight: 700;
            line-height: 1;
            background: linear-gradient(120deg, #ffffff, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-top: 4px;
            font-weight: 600;
        }

        /* Action Button */
        .action-wrapper {
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 56px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.4);
            border-radius: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: not-allowed;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            text-decoration: none;
        }

        .btn.active {
            background: var(--accent-glow);
            border: none;
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.3);
        }

        .btn.active:active {
            transform: scale(0.98);
            box-shadow: 0 4px 12px rgba(168, 85, 247, 0.2);
        }

        .btn-glow {
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: translateX(-100%);
        }

        .btn.active:hover .btn-glow {
            animation: shine 1.5s infinite;
        }

        /* Error Box */
        .error-box {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            color: #fca5a5;
            font-size: 14px;
            max-width: 90%;
            margin: 20px auto;
            backdrop-filter: blur(10px);
        }

        /* Animations */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes shine {
            100% { transform: translateX(100%); }
        }
    </style>
</head>
<body>

    <div class="container" id="main-content">
        <!-- Header -->
        <div class="header">
            <div class="logo-container">
                <svg class="logo-svg" viewBox="0 0 24 24">
                    <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                </svg>
            </div>
            <h1>Secure Verification</h1>
            <p class="subtitle">Please wait for the secure session validation to complete.<br><span style="font-size: 11px; opacity: 0.6; display: inline-block; margin-top: 4px;">v4.0.0</span></p>
        </div>

        <!-- Timer Circle -->
        <div class="timer-card">
            <div class="progress-ring-container">
                <svg class="progress-ring" width="160" height="160">
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#a855f7" />
                            <stop offset="100%" stop-color="#3b82f6" />
                        </linearGradient>
                    </defs>
                    <circle class="progress-ring-circle-bg" cx="80" cy="80" r="70" />
                    <circle class="progress-ring-circle" id="progress-circle" cx="80" cy="80" r="70" />
                </svg>
                <div class="timer-text">
                    <div class="timer-number" id="countdown-number">-</div>
                    <div class="timer-label" id="countdown-label">Seconds</div>
                </div>
            </div>
        </div>

        <!-- Action Button -->
        <div class="action-wrapper">
            <a href="#" class="btn" id="action-btn" style="pointer-events: none;">
                <span class="btn-glow"></span>
                <span id="btn-text">Initializing Secure Connection...</span>
            </a>
        </div>
    </div>

    <!-- Error container -->
    <div class="error-box" id="error-box" style="display:none; flex-direction:column; align-items:center; gap:12px; padding:32px 20px;">
        <div style="font-size:48px;">⚠️</div>
        <strong style="font-size:18px;">Open from Telegram</strong>
        <span id="error-message" style="text-align:center; opacity:0.75; line-height:1.6;">
            This page must be opened via the bot's Verify button inside Telegram — it cannot be accessed directly in a browser.
        </span>
        <div style="margin-top:12px; padding:8px 16px; background:rgba(255,255,255,0.05); border-radius:8px; font-size:11px; opacity:0.5; font-family:monospace;">
            Code Version: v4.0.0
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp SDK
        if (window.Telegram && window.Telegram.WebApp) {
            Telegram.WebApp.ready();
            Telegram.WebApp.expand();
            // Set header & background colors
            Telegram.WebApp.setHeaderColor('#0f0c20');
            Telegram.WebApp.setBackgroundColor('#0f0c20');
        }

        // Get Query Parameters
        const urlParams = new URLSearchParams(window.location.search);
        const payload = urlParams.get('payload') || urlParams.get('token');
        const bot = urlParams.get('bot');
        const countdownSeconds = parseInt(urlParams.get('cd')) || 5;

        const mainContent = document.getElementById('main-content');
        const errorBox = document.getElementById('error-box');
        const errorMessage = document.getElementById('error-message');

        // Validation Check
        if (!payload || !bot) {
            mainContent.style.display = 'none';
            errorBox.style.display = 'flex';
        } else {
            startVerification(payload, bot, countdownSeconds);
        }

        function startVerification(payload, bot, duration) {
            const circle = document.getElementById('progress-circle');
            const radius = circle.r.baseVal.value;
            const circumference = 2 * Math.PI * radius;

            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = `${circumference}`;

            const numberDisplay = document.getElementById('countdown-number');
            const labelDisplay = document.getElementById('countdown-label');
            const actionBtn = document.getElementById('action-btn');
            const btnText = document.getElementById('btn-text');

            let timeLeft = duration;
            numberDisplay.textContent = timeLeft;
            btnText.textContent = `Please wait ${timeLeft}s...`;

            // Progress updating function
            function setProgress(percent) {
                const offset = circumference - (percent / 100) * circumference;
                circle.style.strokeDashoffset = offset;
            }

            setProgress(100);

            // Timer Interval
            const interval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    setProgress(0);
                    numberDisplay.textContent = "✓";
                    labelDisplay.textContent = "Verified";
                    
                    // Enable Action Button
                    actionBtn.style.pointerEvents = "auto";
                    actionBtn.classList.add('active');
                    btnText.textContent = "Complete Verification";
                    
                    // Haptic feedback on success
                    if (window.Telegram && window.Telegram.WebApp && Telegram.WebApp.HapticFeedback) {
                        Telegram.WebApp.HapticFeedback.notificationOccurred('success');
                    }
                } else {
                    numberDisplay.textContent = timeLeft;
                    btnText.textContent = `Please wait ${timeLeft}s...`;
                    const percent = (timeLeft / duration) * 100;
                    setProgress(percent);
                }
            }, 1000);

            let hasClicked = false;

            // Click action — uses sendData() to send payload directly to bot
            // This is the correct Telegram Mini App API: no deep links needed!
            // The bot receives this as a web_app_data message handler.
            actionBtn.addEventListener('click', (e) => {
                e.preventDefault();
                
                if (timeLeft > 0 || hasClicked) {
                    return;
                }
                
                hasClicked = true;
                actionBtn.style.pointerEvents = "none";
                actionBtn.style.opacity = "0.8";
                btnText.textContent = "Sending to bot...";
                
                if (window.Telegram && window.Telegram.WebApp) {
                    try {
                        // sendData() sends payload to bot as web_app_data and auto-closes the Mini App
                        Telegram.WebApp.sendData(payload);
                    } catch (err) {
                        hasClicked = false;
                        actionBtn.style.pointerEvents = "auto";
                        actionBtn.style.opacity = "1";
                        btnText.textContent = "Complete Verification";
                        alert("Error: " + err.message + "\n\nMake sure you opened this via Telegram.");
                    }
                } else {
                    alert("Please open this page from Telegram to receive your files.");
                    hasClicked = false;
                    actionBtn.style.pointerEvents = "auto";
                    actionBtn.style.opacity = "1";
                }
            });
        }
    </script>
</body>
</html>
