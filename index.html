<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Please Wait...</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        p {
            font-size: 16px;
            color: var(--tg-theme-hint-color, #999999);
            margin-bottom: 30px;
        }
        .timer {
            font-size: 48px;
            font-weight: bold;
            color: var(--tg-theme-button-color, #3390ec);
            margin-bottom: 30px;
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 20px 40px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn {
            background-color: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            padding: 14px 24px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            transition: opacity 0.2s;
            display: none;
        }
        .btn:active {
            opacity: 0.8;
        }
        .file-info {
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            word-break: break-word;
            font-size: 14px;
            font-weight: 500;
            display: none;
            max-width: 90%;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .loader {
            border: 4px solid var(--tg-theme-secondary-bg-color, #f4f4f5);
            border-top: 4px solid var(--tg-theme-button-color, #3390ec);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
            display: none;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="loading" class="loader"></div>
    <h1 id="title">Preparing File...</h1>
    <p id="subtitle">Please wait while we prepare your secure download link.</p>

    <div id="file-info" class="file-info">
        <span id="file-name"></span>
    </div>

    <div id="timer-box" class="timer">15</div>

    <button id="action-btn" class="btn">Get File Now</button>

    <script>
        // Initialize Telegram Web App
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const botUsername = urlParams.get('bot');
        const waitTime = parseInt(urlParams.get('wait') || '15');
        const fileName = urlParams.get('name');

        const titleEl = document.getElementById('title');
        const subtitleEl = document.getElementById('subtitle');
        const timerBox = document.getElementById('timer-box');
        const actionBtn = document.getElementById('action-btn');
        const loader = document.getElementById('loading');

        if (!token || !botUsername) {
            titleEl.innerText = "Error";
            subtitleEl.innerText = "Invalid link. Please request the file again from the bot.";
            timerBox.style.display = 'none';
        } else {
            if (fileName) {
                document.getElementById('file-info').style.display = 'block';
                document.getElementById('file-name').innerText = "📄 " + fileName;
            }

            let timeLeft = waitTime;
            timerBox.innerText = timeLeft;

            const interval = setInterval(() => {
                timeLeft--;
                timerBox.innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    timerBox.style.display = 'none';
                    titleEl.innerText = "Ready!";
                    subtitleEl.innerText = "Your file is ready to be delivered.";
                    actionBtn.style.display = 'block';
                }
            }, 1000);

            actionBtn.addEventListener('click', () => {
                actionBtn.style.display = 'none';
                loader.style.display = 'block';
                titleEl.innerText = "Redirecting...";
                
                const tgLink = `tg://resolve?domain=${botUsername}&start=getfile_${token}`;
                const tMeLink = `https://t.me/${botUsername}?start=getfile_${token}`;
                
                // Show fallback message with standard external link in case native redirect fails
                subtitleEl.innerHTML = `Returning you to the bot to get your file...<br><br>` +
                    `<a href="${tMeLink}" target="_blank" ` +
                    `style="color: var(--tg-theme-link-color, #3390ec); font-weight: bold; text-decoration: underline; font-size: 15px;">` +
                    `Click here if not redirected automatically</a>`;
                
                // Redirect back to the bot natively using tg:// link
                window.Telegram.WebApp.openTelegramLink(tgLink);
                
                // Close the mini app after a safe delay of 1.5 seconds
                // This ensures the client registers the openTelegramLink request before the WebApp is closed.
                setTimeout(() => {
                    window.Telegram.WebApp.close();
                }, 1500);
            });
        }
    </script>
</body>
</html>
